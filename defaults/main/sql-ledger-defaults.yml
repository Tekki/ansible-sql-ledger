---
# defaults file for sql-ledger

sl_lx_locales:
  - en_US
sl_lx_default_locale: en_US
sl_lx_timezone: UTC
sl_texlive_languages:
  - english

sl_debian_packages:
  - apache2
  - cpanminus
  - file
  - git-core
  - gpg
  - gpg-agent
  - postgresql
  - python3-passlib
  - vim
sl_debian_additional_packages: []
sl_debian_perl_packages:
  - libarchive-extract-perl
  - libarchive-zip-perl
  - libdbd-mock-perl
  - libdbd-pg-perl
  - libexcel-writer-xlsx-perl
  - libio-socket-ssl-perl
  - libhtml-form-perl
  - libimager-perl
  - libextutils-cppguess-perl
  - libmojolicious-perl
  - libspreadsheet-parsexlsx-perl
  - libtext-qrcode-perl
  - libtemplate-perl
  - libtie-ixhash-perl
  - libyaml-pp-perl
sl_debian_perl_cpan:
  - Print::Colored
sl_debian_perl_additional_cpan: []
sl_debian_latex_packages:
  - texlive
  - texlive-fonts-extra
  - fonts-liberation
sl_debian_httpd_user: www-data
sl_debian_httpd_group: www-data

sl_gpg_path: /var/www/gnupg
sl_git_branch: main
sl_git_source: https://github.com/Tekki/sql-ledger
sl_helpful_login: false
sl_httpd_config: /etc/apache2
sl_httpd_path: /var/www/sql-ledger
sl_httpd_url: sql-ledger
sl_login_language:
sl_latex: true
sl_latex_dvipdf: false
sl_latex_pdftk: true
sl_latex_xelatex: true
sl_postgres_user: sql-ledger
sl_protect_admin: false
sl_sendmail: '| /usr/sbin/sendmail -f <%from%> -t'
sl_totp_admin: false
